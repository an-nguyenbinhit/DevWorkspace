<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Background rounded square -->
  <rect width="64" height="64" rx="14" fill="#0f172a"/>

  <!-- Terminal window top bar -->
  <rect x="8" y="10" width="48" height="30" rx="4" fill="#1e293b"/>

  <!-- Window control dots -->
  <circle cx="15" cy="17" r="2.5" fill="#ef4444"/>
  <circle cx="23" cy="17" r="2.5" fill="#f59e0b"/>
  <circle cx="31" cy="17" r="2.5" fill="#22c55e"/>

  <!-- Code lines -->
  <!-- Prompt chevron -->
  <path d="M12 27 L16 31 L12 35" stroke="#6366f1" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Cursor line -->
  <rect x="18" y="29.5" width="12" height="2.5" rx="1.2" fill="#38bdf8"/>
  <rect x="32" y="29.5" width="6" height="2.5" rx="1.2" fill="#38bdf8" opacity="0.4"/>

  <!-- Second code line -->
  <rect x="18" y="23" width="18" height="2" rx="1" fill="#94a3b8" opacity="0.5"/>

  <!-- Bracket decorators bottom -->
  <text x="10" y="57" font-family="monospace" font-weight="bold" font-size="13" fill="#6366f1">&lt;/&gt;</text>

  <!-- DW text -->
  <text x="34" y="57" font-family="Arial, sans-serif" font-weight="800" font-size="11" fill="#38bdf8">DW</text>
</svg>
